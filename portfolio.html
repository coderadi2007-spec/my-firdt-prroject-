  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">

  <link rel="stylesheet" href="assets/css/responsive.css">
  <style>
    .page-hero { background: linear-gradient(135deg, #0a0f2a, #050816); margin-top: 80px; padding: 80px 0; text-align: center; }
    .portfolio-filters { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin: 40px 0; }
    .filter-btn { background: transparent; border: 1px solid rgba(0,212,255,0.3); padding: 10px 28px; border-radius: 50px; color: white; cursor: pointer; transition: 0.3s; }
    .filter-btn:hover, .filter-btn.active { background: #00D4FF; color: #050816; border-color: #00D4FF; }
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 30px; }
    .portfolio-item { position: relative; border-radius: 20px; overflow: hidden; cursor: pointer; }
    .portfolio-item img { width: 100%; height: 280px; object-fit: cover; transition: 0.5s; }
    .portfolio-item:hover img { transform: scale(1.1); }
    .portfolio-overlay { position: absolute; bottom: -100%; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 20px; transition: 0.3s; }
    .portfolio-item:hover .portfolio-overlay { bottom: 0; }
    .portfolio-overlay h3 { font-size: 18px; margin-bottom: 5px; }
    .portfolio-overlay span { font-size: 12px; color: #00D4FF; }
  </style>
</head>

      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="web">Web</button>
      <button class="filter-btn" data-filter="mobile">Mobile</button>
      <button class="filter-btn" data-filter="software">Software</button>
      <button class="filter-btn" data-filter="blockchain">Blockchain</button>
